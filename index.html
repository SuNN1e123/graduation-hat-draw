<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>🎓 畢業帽塗鴉板</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-touch-callout: none; -webkit-user-select: none; user-select: none; }
        body { font-family: Arial, "Microsoft JhengHei", sans-serif; background: #f0f0f0; display: flex; justify-content: center; align-items: center; min-height: 100vh; touch-action: none; padding: 10px; }
        .container { background: #f0f0f0; border-radius: 12px; max-width: 1100px; width: 100%; height: 90vh; display: flex; gap: 10px; padding: 10px; }
        .left-panel { background: #f0f0f0; width: 220px; min-width: 200px; display: flex; flex-direction: column; gap: 8px; overflow-y: auto; padding-right: 5px; }
        .title { font-size: 20px; font-weight: bold; text-align: center; padding: 10px 0; color: #333; background: #f0f0f0; }
        .tool-group { background: white; border-radius: 8px; padding: 12px; border: 1px solid #e0e0e0; }
        .tool-group-title { font-size: 13px; font-weight: bold; color: #555; margin-bottom: 8px; display: block; }
        .color-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 5px; }
        .color-btn { width: 100%; aspect-ratio: 1; border-radius: 50%; border: 3px solid transparent; cursor: pointer; transition: all 0.2s; min-height: 35px; }
        .color-btn:hover { transform: scale(1.05); }
        .color-btn.active { border-color: #333; box-shadow: 0 0 0 2px white, 0 0 0 4px #333; }
        .custom-color-row { display: flex; gap: 8px; margin-top: 8px; align-items: center; }
        .custom-color-row input[type="color"] { flex: 1; height: 35px; border: none; border-radius: 6px; cursor: pointer; padding: 0; }
        .custom-color-row button { flex: 1; padding: 6px; border: 1px solid #ddd; border-radius: 6px; background: white; cursor: pointer; font-size: 13px; }
        .color-preview { width: 100%; height: 25px; border-radius: 6px; margin-top: 8px; border: 1px solid #ddd; }
        .size-control { display: flex; align-items: center; gap: 10px; }
        .size-control input[type="range"] { flex: 1; cursor: pointer; }
        .size-label { font-size: 14px; font-weight: bold; min-width: 25px; text-align: center; }
        .tool-btn { width: 100%; padding: 10px; border: none; border-radius: 6px; font-size: 14px; font-weight: bold; cursor: pointer; transition: all 0.2s; margin-bottom: 5px; color: white; }
        .tool-btn:hover { transform: scale(1.02); }
        .tool-btn:active { transform: scale(0.98); }
        .btn-pen { background: #4CAF50; }
        .btn-pen.active { background: #388E3C; box-shadow: 0 0 0 3px #333; }
        .btn-eraser { background: #FF9800; }
        .btn-eraser.active { background: #F57C00; box-shadow: 0 0 0 3px #333; }
        .btn-clear { background: #f44336; }
        .btn-undo { background: #2196F3; }
        .btn-redo { background: #9C27B0; }
        .btn-save { background: #4CAF50; font-size: 16px; padding: 12px; height: auto; }
        .status { text-align: center; font-size: 13px; color: #555; padding: 8px; background: white; border-radius: 8px; border: 1px solid #e0e0e0; min-height: 36px; display: flex; align-items: center; justify-content: center; }
        .right-panel { 
            flex: 1; 
            background: white; 
            border-radius: 8px; 
            border: 2px solid #ddd; 
            overflow: hidden; 
            position: relative; 
            min-height: 400px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .right-panel .canvas-wrapper {
            position: relative;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .right-panel canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            touch-action: none;
            cursor: crosshair;
        }
        #canvasBottom {
            z-index: 1;
        }
        #canvasTop {
            z-index: 2;
        }
        .left-panel::-webkit-scrollbar { width: 4px; }
        .left-panel::-webkit-scrollbar-thumb { background: #ccc; border-radius: 4px; }
        @media (max-width: 768px) {
            .container { flex-direction: column; height: auto; min-height: 100vh; gap: 8px; padding: 8px; }
            .left-panel { width: 100%; min-width: unset; flex-direction: row; flex-wrap: wrap; gap: 6px; padding-right: 0; max-height: 300px; overflow-y: auto; }
            .left-panel > * { flex: 1; min-width: 140px; }
            .title { width: 100%; font-size: 18px; padding: 5px 0; }
            .right-panel { min-height: 300px; flex: 1; }
        }
        @media (max-width: 480px) {
            .left-panel { max-height: 250px; }
            .left-panel > * { min-width: 120px; }
            .tool-group { padding: 8px; }
            .color-btn { min-height: 28px; }
            .tool-btn { padding: 6px; font-size: 12px; }
            .title { font-size: 16px; }
        }
        @media (pointer: coarse) {
            .tool-btn { padding: 12px; font-size: 16px; min-height: 48px; }
            .color-btn { min-height: 40px; }
            .btn-save { min-height: 56px; font-size: 18px; }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="left-panel">
        <div class="title">🎓 畢業帽塗鴉</div>
        <div class="tool-group">
            <span class="tool-group-title">🎨 顏色</span>
            <div class="color-grid" id="colorGrid">
                <button class="color-btn active" style="background:#FF0000" data-color="#FF0000"></button>
                <button class="color-btn" style="background:#FF6B00" data-color="#FF6B00"></button>
                <button class="color-btn" style="background:#FFD700" data-color="#FFD700"></button>
                <button class="color-btn" style="background:#00CC00" data-color="#00CC00"></button>
                <button class="color-btn" style="background:#0066FF" data-color="#0066FF"></button>
                <button class="color-btn" style="background:#8B00FF" data-color="#8B00FF"></button>
                <button class="color-btn" style="background:#FF00FF" data-color="#FF00FF"></button>
                <button class="color-btn" style="background:#000000" data-color="#000000"></button>
            </div>
            <div class="custom-color-row">
                <input type="color" id="customColor" value="#FF0000">
                <button id="customColorBtn">自訂顏色</button>
            </div>
            <div class="color-preview" id="colorPreview" style="background:#FF0000;"></div>
        </div>
        <div class="tool-group">
            <span class="tool-group-title">✏️ 筆刷大小</span>
            <div class="size-control">
                <input type="range" id="brushSize" min="1" max="30" value="5">
                <span class="size-label" id="sizeLabel">5</span>
            </div>
        </div>
        <div class="tool-group">
            <span class="tool-group-title">🛠 工具</span>
            <button class="tool-btn btn-pen active" id="btnPen">✏️ 畫筆</button>
            <button class="tool-btn btn-eraser" id="btnEraser">🧹 橡皮擦</button>
            <button class="tool-btn btn-clear" id="btnClear">🗑 清空畫布</button>
        </div>
        <div class="tool-group">
            <span class="tool-group-title">↩️ 歷史</span>
            <button class="tool-btn btn-undo" id="btnUndo">↩️ 復原</button>
            <button class="tool-btn btn-redo" id="btnRedo">↪️ 重做</button>
        </div>
        <button class="tool-btn btn-save" id="btnSave">💾 匯出圖片</button>
        <div class="status" id="status">🟢 畫筆模式</div>
    </div>
    <div class="right-panel">
        <div class="canvas-wrapper">
            <canvas id="canvasBottom"></canvas>
            <canvas id="canvasTop"></canvas>
        </div>
    </div>
</div>
<script>
// ============================================================
// 完美雙層繪圖系統
// ============================================================

// ----- 兩個 canvas -----
const canvasBottom = document.getElementById('canvasBottom');  // 底層：只放圖片
const canvasTop = document.getElementById('canvasTop');        // 上層：只放筆跡
const ctxBottom = canvasBottom.getContext('2d');
const ctxTop = canvasTop.getContext('2d');

// ----- 固定尺寸（像素） -----
const CANVAS_WIDTH = 600;
const CANVAS_HEIGHT = 600;

// 設定兩個 canvas 的實際像素尺寸
canvasBottom.width = CANVAS_WIDTH;
canvasBottom.height = CANVAS_HEIGHT;
canvasTop.width = CANVAS_WIDTH;
canvasTop.height = CANVAS_HEIGHT;

// ----- 繪圖設定 -----
let penColor = '#FF0000';
let penWidth = 5;
let eraserMode = false;
let isDrawing = false;
let lastX = null;
let lastY = null;

// ----- Undo/Redo（只儲存上層） -----
let undoStack = [];
let redoStack = [];
const MAX_HISTORY = 50;

// ----- 圖片 -----
let hatImage = null;
let imageLoaded = false;

// ============================================================
// 初始化
// ============================================================

function initCanvas() {
    // 設定上層為全透明
    ctxTop.clearRect(0, 0, CANVAS_WIDTH, CANVAS_HEIGHT);
    
    // 載入圖片
    loadHatImage();
}

// ============================================================
// 載入圖片（只畫在底層）
// ============================================================

function loadHatImage() {
    const img = new Image();
    img.crossOrigin = 'anonymous';
    img.onload = function() {
        hatImage = img;
        imageLoaded = true;
        // 畫到底層
        ctxBottom.clearRect(0, 0, CANVAS_WIDTH, CANVAS_HEIGHT);
        ctxBottom.drawImage(img, 0, 0, CANVAS_WIDTH, CANVAS_HEIGHT);
        document.getElementById('status').textContent = '✅ 已載入圖片！';
        console.log('✅ 成功載入圖片：hat.png');
        saveState();
    };
    img.onerror = function() {
        imageLoaded = false;
        hatImage = null;
        // 在底層顯示提示
        ctxBottom.fillStyle = 'white';
        ctxBottom.fillRect(0, 0, CANVAS_WIDTH, CANVAS_HEIGHT);
        ctxBottom.fillStyle = 'black';
        ctxBottom.font = '24px Arial';
        ctxBottom.textAlign = 'center';
        ctxBottom.textBaseline = 'middle';
        ctxBottom.fillText('請將你的畢業帽圖片', CANVAS_WIDTH/2, CANVAS_HEIGHT/2 - 30);
        ctxBottom.fillText('命名為 hat.png 放在此資料夾', CANVAS_WIDTH/2, CANVAS_HEIGHT/2 + 30);
        ctxBottom.fillStyle = '#FFD700';
        ctxBottom.fillRect(200, 250, 200, 60);
        ctxBottom.fillStyle = '#8B0000';
        ctxBottom.fillRect(260, 310, 80, 50);
        ctxBottom.strokeStyle = '#000000';
        ctxBottom.lineWidth = 3;
        ctxBottom.strokeRect(200, 250, 200, 60);
        ctxBottom.strokeRect(260, 310, 80, 50);
        alert('找不到 hat.png！\n請將你的畢業帽圖片命名為 hat.png 放在程式同一個資料夾中。');
        console.log('❌ 找不到 hat.png');
        saveState();
    };
    img.src = 'hat.png';
}

// ============================================================
// 繪畫功能（只畫在上層）
// ============================================================

function getPos(e) {
    const rect = canvasTop.getBoundingClientRect();
    const scaleX = canvasTop.width / rect.width;
    const scaleY = canvasTop.height / rect.height;
    
    let clientX, clientY;
    if (e.touches) {
        clientX = e.touches[0].clientX;
        clientY = e.touches[0].clientY;
        e.preventDefault();
    } else {
        clientX = e.clientX;
        clientY = e.clientY;
    }
    
    return {
        x: Math.max(0, Math.min((clientX - rect.left) * scaleX, CANVAS_WIDTH - 1)),
        y: Math.max(0, Math.min((clientY - rect.top) * scaleY, CANVAS_HEIGHT - 1))
    };
}

function startDrawing(e) {
    e.preventDefault();
    isDrawing = true;
    const pos = getPos(e);
    lastX = pos.x;
    lastY = pos.y;
}

function draw(e) {
    e.preventDefault();
    if (!isDrawing || lastX === null || lastY === null) return;
    
    const pos = getPos(e);
    const currentX = Math.max(0, Math.min(pos.x, CANVAS_WIDTH - 1));
    const currentY = Math.max(0, Math.min(pos.y, CANVAS_HEIGHT - 1));
    
    // ----- 只操作上層 canvas (ctxTop) -----
    ctxTop.save();
    
    if (eraserMode) {
        // 橡皮擦：用 destination-out 擦掉上層的像素
        ctxTop.globalCompositeOperation = 'destination-out';
        ctxTop.strokeStyle = 'rgba(0,0,0,1)';
        ctxTop.lineWidth = penWidth * 2;
        ctxTop.lineCap = 'round';
        ctxTop.lineJoin = 'round';
        ctxTop.beginPath();
        ctxTop.moveTo(lastX, lastY);
        ctxTop.lineTo(currentX, currentY);
        ctxTop.stroke();
    } else {
        // 畫筆：正常畫在上層
        ctxTop.globalCompositeOperation = 'source-over';
        ctxTop.strokeStyle = penColor;
        ctxTop.lineWidth = penWidth;
        ctxTop.lineCap = 'round';
        ctxTop.lineJoin = 'round';
        ctxTop.beginPath();
        ctxTop.moveTo(lastX, lastY);
        ctxTop.lineTo(currentX, currentY);
        ctxTop.stroke();
    }
    
    ctxTop.restore();
    
    lastX = currentX;
    lastY = currentY;
}

function stopDrawing(e) {
    e.preventDefault();
    if (isDrawing) {
        isDrawing = false;
        lastX = null;
        lastY = null;
        saveState();
    }
}

// ============================================================
// Undo / Redo（只儲存上層）
// ============================================================

function saveState() {
    // 儲存上層 canvas 的資料
    const imageData = ctxTop.getImageData(0, 0, CANVAS_WIDTH, CANVAS_HEIGHT);
    if (undoStack.length > MAX_HISTORY) {
        undoStack.shift();
    }
    undoStack.push(imageData);
    redoStack = [];
}

function undo() {
    if (undoStack.length <= 1) {
        document.getElementById('status').textContent = '⚠️ 沒有更多步驟可以復原';
        return;
    }
    // 儲存當前到 redo
    const current = ctxTop.getImageData(0, 0, CANVAS_WIDTH, CANVAS_HEIGHT);
    redoStack.push(current);
    
    // 回到上一步
    undoStack.pop();
    const previous = undoStack[undoStack.length - 1];
    ctxTop.putImageData(previous, 0, 0);
    document.getElementById('status').textContent = '↩️ 已復原';
}

function redo() {
    if (redoStack.length === 0) {
        document.getElementById('status').textContent = '⚠️ 沒有更多步驟可以重做';
        return;
    }
    // 儲存當前到 undo
    const current = ctxTop.getImageData(0, 0, CANVAS_WIDTH, CANVAS_HEIGHT);
    undoStack.push(current);
    
    // 從 redo 取出
    const next = redoStack.pop();
    ctxTop.putImageData(next, 0, 0);
    document.getElementById('status').textContent = '↪️ 已重做';
}

// ============================================================
// 清空畫布（只清空上層）
// ============================================================

function clearCanvas() {
    if (confirm('確定要清除所有繪圖嗎？（圖片不會被清除）')) {
        ctxTop.clearRect(0, 0, CANVAS_WIDTH, CANVAS_HEIGHT);
        saveState();
        document.getElementById('status').textContent = '🗑 已清空畫布';
    }
}

// ============================================================
// 匯出圖片（合併底層 + 上層）
// ============================================================

function saveImage() {
    // 建立一個暫存 canvas 來合併
    const tempCanvas = document.createElement('canvas');
    tempCanvas.width = CANVAS_WIDTH;
    tempCanvas.height = CANVAS_HEIGHT;
    const tempCtx = tempCanvas.getContext('2d');
    
    // 先畫底層
    tempCtx.drawImage(canvasBottom, 0, 0);
    // 再畫上層（筆跡）
    tempCtx.drawImage(canvasTop, 0, 0);
    
    // 匯出
    const link = document.createElement('a');
    const now = new Date();
    const dateStr = now.getFullYear() + '-' + 
                   String(now.getMonth() + 1).padStart(2, '0') + '-' + 
                   String(now.getDate()).padStart(2, '0');
    link.download = '畢業帽塗鴉_' + dateStr + '.png';
    link.href = tempCanvas.toDataURL('image/png');
    link.click();
    document.getElementById('status').textContent = '💾 圖片已儲存！';
}

// ============================================================
// 事件綁定
// ============================================================

// 綁定到上層 canvas（因為上層接收所有繪圖事件）
canvasTop.addEventListener('mousedown', startDrawing);
canvasTop.addEventListener('mousemove', draw);
canvasTop.addEventListener('mouseup', stopDrawing);
canvasTop.addEventListener('mouseleave', stopDrawing);

canvasTop.addEventListener('touchstart', startDrawing, { passive: false });
canvasTop.addEventListener('touchmove', draw, { passive: false });
canvasTop.addEventListener('touchend', stopDrawing, { passive: false });

// 顏色
document.querySelectorAll('.color-btn').forEach(btn => {
    btn.addEventListener('click', function() {
        document.querySelectorAll('.color-btn').forEach(b => b.classList.remove('active'));
        this.classList.add('active');
        penColor = this.dataset.color;
        eraserMode = false;
        document.getElementById('btnPen').classList.add('active');
        document.getElementById('btnEraser').classList.remove('active');
        document.getElementById('colorPreview').style.background = penColor;
        document.getElementById('status').textContent = '🟢 畫筆模式 | 顏色: ' + penColor;
    });
});

// 自訂顏色
document.getElementById('customColor').addEventListener('input', function() {
    penColor = this.value;
    document.querySelectorAll('.color-btn').forEach(b => b.classList.remove('active'));
    document.getElementById('colorPreview').style.background = penColor;
    eraserMode = false;
    document.getElementById('btnPen').classList.add('active');
    document.getElementById('btnEraser').classList.remove('active');
    document.getElementById('status').textContent = '🟢 畫筆模式 | 顏色: ' + penColor;
});

document.getElementById('customColorBtn').addEventListener('click', function() {
    document.getElementById('customColor').click();
});

// 筆刷大小
document.getElementById('brushSize').addEventListener('input', function() {
    penWidth = parseInt(this.value);
    document.getElementById('sizeLabel').textContent = penWidth;
});

// 工具
document.getElementById('btnPen').addEventListener('click', function() {
    eraserMode = false;
    this.classList.add('active');
    document.getElementById('btnEraser').classList.remove('active');
    document.getElementById('status').textContent = '🟢 畫筆模式 | 顏色: ' + penColor;
});

document.getElementById('btnEraser').addEventListener('click', function() {
    eraserMode = true;
    this.classList.add('active');
    document.getElementById('btnPen').classList.remove('active');
    document.getElementById('status').textContent = '🧹 橡皮擦模式（只擦筆跡，不影響圖片）';
});

// 歷史
document.getElementById('btnUndo').addEventListener('click', undo);
document.getElementById('btnRedo').addEventListener('click', redo);

// 清空
document.getElementById('btnClear').addEventListener('click', clearCanvas);

// 匯出
document.getElementById('btnSave').addEventListener('click', saveImage);

// ============================================================
// 啟動
// ============================================================

initCanvas();

console.log('🎓 畢業帽塗鴉板已啟動！');
console.log('📌 底層 = 圖片（永遠不變）');
console.log('📌 上層 = 筆跡（橡皮擦只擦這裡）');
console.log('💡 橡皮擦不會影響你的圖片！');
</script>
</body>
</html>
