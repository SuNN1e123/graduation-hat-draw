<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>🎓 畢業帽塗鴉板</title>
    <style>
        * { 
            margin: 0; 
            padding: 0; 
            box-sizing: border-box; 
            -webkit-touch-callout: none; 
            -webkit-user-select: none; 
            user-select: none; 
        }
        
        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: Arial, "Microsoft JhengHei", sans-serif;
            background: #f0f0f0;
            touch-action: none;
        }
        
        .container { 
            display: flex;
            flex-direction: row;
            width: 100vw;
            height: 100vh;
            max-width: 1200px;
            margin: 0 auto;
            padding: 8px;
            gap: 8px;
            background: #f0f0f0;
        }
        
        /* ===== 左側工具面板 ===== */
        .left-panel { 
            background: #f0f0f0;
            width: 200px;
            min-width: 180px;
            display: flex;
            flex-direction: column;
            gap: 6px;
            overflow-y: auto;
            padding-right: 4px;
            flex-shrink: 0;
        }
        
        .left-panel::-webkit-scrollbar { width: 3px; }
        .left-panel::-webkit-scrollbar-thumb { background: #ccc; border-radius: 3px; }
        
        .title { 
            font-size: 18px; 
            font-weight: bold; 
            text-align: center; 
            padding: 8px 0; 
            color: #333;
            flex-shrink: 0;
        }
        
        .tool-group { 
            background: white; 
            border-radius: 8px; 
            padding: 8px 10px; 
            border: 1px solid #e0e0e0;
            flex-shrink: 0;
        }
        
        .tool-group-title { 
            font-size: 12px; 
            font-weight: bold; 
            color: #555; 
            margin-bottom: 5px; 
            display: block; 
        }
        
        .color-grid { 
            display: grid; 
            grid-template-columns: repeat(4, 1fr); 
            gap: 4px; 
        }
        
        .color-btn { 
            width: 100%; 
            aspect-ratio: 1; 
            border-radius: 50%; 
            border: 2px solid transparent; 
            cursor: pointer; 
            transition: all 0.2s; 
            min-height: 30px;
        }
        
        .color-btn.active { 
            border-color: #333; 
            box-shadow: 0 0 0 2px white, 0 0 0 4px #333; 
        }
        
        .custom-color-row { 
            display: flex; 
            gap: 6px; 
            margin-top: 5px; 
            align-items: center; 
        }
        
        .custom-color-row input[type="color"] { 
            flex: 1; 
            height: 30px; 
            border: none; 
            border-radius: 4px; 
            cursor: pointer; 
            padding: 0; 
        }
        
        .custom-color-row button { 
            flex: 1; 
            padding: 4px 6px; 
            border: 1px solid #ddd; 
            border-radius: 4px; 
            background: white; 
            cursor: pointer; 
            font-size: 12px; 
        }
        
        .color-preview { 
            width: 100%; 
            height: 20px; 
            border-radius: 4px; 
            margin-top: 5px; 
            border: 1px solid #ddd; 
        }
        
        .size-control { 
            display: flex; 
            align-items: center; 
            gap: 8px; 
        }
        
        .size-control input[type="range"] { 
            flex: 1; 
            cursor: pointer; 
            height: 4px;
        }
        
        .size-label { 
            font-size: 13px; 
            font-weight: bold; 
            min-width: 20px; 
            text-align: center; 
        }
        
        .tool-btn { 
            width: 100%; 
            padding: 6px 8px; 
            border: none; 
            border-radius: 4px; 
            font-size: 12px; 
            font-weight: bold; 
            cursor: pointer; 
            transition: all 0.2s; 
            margin-bottom: 3px; 
            color: white; 
        }
        
        .tool-btn:active { transform: scale(0.97); }
        .btn-pen { background: #4CAF50; }
        .btn-pen.active { background: #388E3C; box-shadow: 0 0 0 2px #333; }
        .btn-eraser { background: #FF9800; }
        .btn-eraser.active { background: #F57C00; box-shadow: 0 0 0 2px #333; }
        .btn-clear { background: #f44336; }
        .btn-undo { background: #2196F3; }
        .btn-redo { background: #9C27B0; }
        .btn-save { 
            background: #4CAF50; 
            font-size: 14px; 
            padding: 10px;
            flex-shrink: 0;
        }
        
        .status { 
            text-align: center; 
            font-size: 11px; 
            color: #555; 
            padding: 5px; 
            background: white; 
            border-radius: 6px; 
            border: 1px solid #e0e0e0; 
            min-height: 28px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }
        
        /* ===== 右側畫布 ===== */
        .right-panel { 
            flex: 1; 
            background: white; 
            border-radius: 8px; 
            border: 2px solid #ddd; 
            overflow: hidden; 
            position: relative; 
            min-height: 200px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .right-panel .canvas-wrapper {
            position: relative;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .right-panel canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            touch-action: none;
            cursor: crosshair;
            image-rendering: auto;
        }
        
        #canvasBottom { z-index: 1; }
        #canvasTop { z-index: 2; }
        
        /* ===== 手機專屬樣式 ===== */
        @media (max-width: 768px) {
            .container {
                flex-direction: column;
                height: 100vh;
                padding: 4px;
                gap: 4px;
            }
            
            .left-panel {
                width: 100%;
                min-width: unset;
                flex-direction: row;
                flex-wrap: wrap;
                gap: 4px;
                padding-right: 0;
                max-height: 200px;
                overflow-y: auto;
                flex-shrink: 0;
            }
            
            .left-panel > * {
                flex: 1;
                min-width: 100px;
            }
            
            .title {
                width: 100%;
                font-size: 16px;
                padding: 4px 0;
                flex: 0 0 100%;
            }
            
            .tool-group {
                padding: 5px 8px;
                min-width: 90px;
            }
            
            .tool-group-title {
                font-size: 10px;
                margin-bottom: 3px;
            }
            
            .color-btn {
                min-height: 24px;
            }
            
            .color-grid {
                gap: 3px;
            }
            
            .custom-color-row input[type="color"] {
                height: 24px;
            }
            
            .custom-color-row button {
                font-size: 10px;
                padding: 2px 4px;
            }
            
            .color-preview {
                height: 16px;
                margin-top: 3px;
            }
            
            .size-control input[type="range"] {
                height: 3px;
            }
            
            .size-label {
                font-size: 11px;
                min-width: 16px;
            }
            
            .tool-btn {
                padding: 4px 6px;
                font-size: 10px;
                margin-bottom: 2px;
            }
            
            .btn-save {
                font-size: 12px;
                padding: 6px;
            }
            
            .status {
                font-size: 10px;
                min-height: 22px;
                padding: 3px 5px;
            }
            
            .right-panel {
                flex: 1;
                min-height: 200px;
            }
        }
        
        @media (max-width: 400px) {
            .left-panel {
                max-height: 160px;
            }
            
            .left-panel > * {
                min-width: 70px;
            }
            
            .tool-group {
                padding: 3px 5px;
            }
            
            .color-btn {
                min-height: 20px;
            }
            
            .tool-btn {
                font-size: 9px;
                padding: 3px 4px;
            }
            
            .btn-save {
                font-size: 10px;
                padding: 4px;
            }
            
            .title {
                font-size: 14px;
            }
        }
        
        /* 觸控優化 */
        @media (pointer: coarse) {
            .tool-btn {
                min-height: 36px;
            }
            .color-btn {
                min-height: 30px;
            }
            .btn-save {
                min-height: 40px;
            }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="left-panel">
        <div class="title">🎓 畢業帽塗鴉</div>
        <div class="tool-group">
            <span class="tool-group-title">🎨 顏色</span>
            <div class="color-grid" id="colorGrid">
                <button class="color-btn active" style="background:#FF0000" data-color="#FF0000"></button>
                <button class="color-btn" style="background:#FF6B00" data-color="#FF6B00"></button>
                <button class="color-btn" style="background:#FFD700" data-color="#FFD700"></button>
                <button class="color-btn" style="background:#00CC00" data-color="#00CC00"></button>
                <button class="color-btn" style="background:#0066FF" data-color="#0066FF"></button>
                <button class="color-btn" style="background:#8B00FF" data-color="#8B00FF"></button>
                <button class="color-btn" style="background:#FF00FF" data-color="#FF00FF"></button>
                <button class="color-btn" style="background:#000000" data-color="#000000"></button>
            </div>
            <div class="custom-color-row">
                <input type="color" id="customColor" value="#FF0000">
                <button id="customColorBtn">自訂</button>
            </div>
            <div class="color-preview" id="colorPreview" style="background:#FF0000;"></div>
        </div>
        <div class="tool-group">
            <span class="tool-group-title">✏️ 筆刷</span>
            <div class="size-control">
                <input type="range" id="brushSize" min="1" max="30" value="5">
                <span class="size-label" id="sizeLabel">5</span>
            </div>
        </div>
        <div class="tool-group">
            <span class="tool-group-title">🛠 工具</span>
            <button class="tool-btn btn-pen active" id="btnPen">✏️ 畫筆</button>
            <button class="tool-btn btn-eraser" id="btnEraser">🧹 橡皮擦</button>
            <button class="tool-btn btn-clear" id="btnClear">🗑 清空</button>
        </div>
        <div class="tool-group">
            <span class="tool-group-title">↩️ 歷史</span>
            <button class="tool-btn btn-undo" id="btnUndo">↩️ 復原</button>
            <button class="tool-btn btn-redo" id="btnRedo">↪️ 重做</button>
        </div>
        <button class="tool-btn btn-save" id="btnSave">💾 匯出圖片</button>
        <div class="status" id="status">🟢 畫筆模式</div>
    </div>
    <div class="right-panel">
        <div class="canvas-wrapper">
            <canvas id="canvasBottom"></canvas>
            <canvas id="canvasTop"></canvas>
        </div>
    </div>
</div>
<script>
// ============================================================
// 完美雙層繪圖系統 - 手機優化版
// ============================================================

const canvasBottom = document.getElementById('canvasBottom');
const canvasTop = document.getElementById('canvasTop');
const ctxBottom = canvasBottom.getContext('2d');
const ctxTop = canvasTop.getContext('2d');

const CANVAS_WIDTH = 600;
const CANVAS_HEIGHT = 600;

canvasBottom.width = CANVAS_WIDTH;
canvasBottom.height = CANVAS_HEIGHT;
canvasTop.width = CANVAS_WIDTH;
canvasTop.height = CANVAS_HEIGHT;

// ----- 繪圖設定 -----
let penColor = '#FF0000';
let penWidth = 5;
let eraserMode = false;
let isDrawing = false;
let lastX = null;
let lastY = null;

// ----- Undo/Redo -----
let undoStack = [];
let redoStack = [];
const MAX_HISTORY = 50;

// ============================================================
// 載入圖片（支援手機）
// ============================================================

function loadHatImage() {
    // 方法1：嘗試載入 hat.png
    const img = new Image();
    img.crossOrigin = 'anonymous';
    
    img.onload = function() {
        ctxBottom.clearRect(0, 0, CANVAS_WIDTH, CANVAS_HEIGHT);
        ctxBottom.drawImage(img, 0, 0, CANVAS_WIDTH, CANVAS_HEIGHT);
        document.getElementById('status').textContent = '✅ 已載入圖片！';
        console.log('✅ 成功載入圖片');
        saveState();
    };
    
    img.onerror = function() {
        // 方法2：如果 hat.png 載入失敗，試試看從 data URL 載入
        console.log('❌ hat.png 載入失敗，嘗試其他方法...');
        
        // 先顯示提示訊息
        ctxBottom.fillStyle = 'white';
        ctxBottom.fillRect(0, 0, CANVAS_WIDTH, CANVAS_HEIGHT);
        ctxBottom.fillStyle = '#999';
        ctxBottom.font = '20px Arial';
        ctxBottom.textAlign = 'center';
        ctxBottom.textBaseline = 'middle';
        ctxBottom.fillText('📱 請點擊下方按鈕', CANVAS_WIDTH/2, CANVAS_HEIGHT/2 - 40);
        ctxBottom.fillText('上傳你的畢業帽圖片', CANVAS_WIDTH/2, CANVAS_HEIGHT/2 + 10);
        
        // 畫一個簡單帽子
        ctxBottom.fillStyle = '#FFD700';
        ctxBottom.fillRect(200, 250, 200, 60);
        ctxBottom.fillStyle = '#8B0000';
        ctxBottom.fillRect(260, 310, 80, 50);
        ctxBottom.strokeStyle = '#333';
        ctxBottom.lineWidth = 2;
        ctxBottom.strokeRect(200, 250, 200, 60);
        ctxBottom.strokeRect(260, 310, 80, 50);
        
        // 顯示上傳按鈕（手機專用）
        showUploadButton();
        
        saveState();
    };
    
    img.src = 'hat.png';
    
    // 設定 timeout，如果 3 秒沒載入就顯示上傳按鈕
    setTimeout(function() {
        if (!img.complete || img.naturalWidth === 0) {
            // 圖片還沒載入完成，但先顯示上傳按鈕
            showUploadButton();
        }
    }, 3000);
}

function showUploadButton() {
    // 在底部顯示上傳按鈕
    const existingBtn = document.getElementById('uploadBtn');
    if (existingBtn) return;
    
    const btn = document.createElement('button');
    btn.id = 'uploadBtn';
    btn.textContent = '📤 上傳圖片';
    btn.style.cssText = `
        position: absolute;
        bottom: 20px;
        left: 50%;
        transform: translateX(-50%);
        z-index: 10;
        padding: 12px 24px;
        background: #4CAF50;
        color: white;
        border: none;
        border-radius: 25px;
        font-size: 16px;
        font-weight: bold;
        cursor: pointer;
        box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        touch-action: manipulation;
    `;
    
    btn.addEventListener('click', function(e) {
        e.stopPropagation();
        uploadImage();
    });
    
    // 放在 right-panel 裡
    const rightPanel = document.querySelector('.right-panel');
    rightPanel.style.position = 'relative';
    rightPanel.appendChild(btn);
}

function uploadImage() {
    const input = document.createElement('input');
    input.type = 'file';
    input.accept = 'image/*';
    input.style.display = 'none';
    
    input.onchange = function(e) {
        const file = e.target.files[0];
        if (!file) return;
        
        const reader = new FileReader();
        reader.onload = function(event) {
            const img = new Image();
            img.onload = function() {
                // 畫到底層
                ctxBottom.clearRect(0, 0, CANVAS_WIDTH, CANVAS_HEIGHT);
                ctxBottom.drawImage(img, 0, 0, CANVAS_WIDTH, CANVAS_HEIGHT);
                document.getElementById('status').textContent = '✅ 圖片上傳成功！';
                
                // 移除上傳按鈕
                const uploadBtn = document.getElementById('uploadBtn');
                if (uploadBtn) uploadBtn.remove();
                
                saveState();
            };
            img.src = event.target.result;
        };
        reader.readAsDataURL(file);
    };
    
    document.body.appendChild(input);
    input.click();
    document.body.removeChild(input);
}

// ============================================================
// 繪畫功能
// ============================================================

function getPos(e) {
    const rect = canvasTop.getBoundingClientRect();
    const scaleX = canvasTop.width / rect.width;
    const scaleY = canvasTop.height / rect.height;
    
    let clientX, clientY;
    if (e.touches) {
        clientX = e.touches[0].clientX;
        clientY = e.touches[0].clientY;
        e.preventDefault();
    } else {
        clientX = e.clientX;
        clientY = e.clientY;
    }
    
    return {
        x: Math.max(0, Math.min((clientX - rect.left) * scaleX, CANVAS_WIDTH - 1)),
        y: Math.max(0, Math.min((clientY - rect.top) * scaleY, CANVAS_HEIGHT - 1))
    };
}

function startDrawing(e) {
    e.preventDefault();
    isDrawing = true;
    const pos = getPos(e);
    lastX = pos.x;
    lastY = pos.y;
}

function draw(e) {
    e.preventDefault();
    if (!isDrawing || lastX === null || lastY === null) return;
    
    const pos = getPos(e);
    const currentX = Math.max(0, Math.min(pos.x, CANVAS_WIDTH - 1));
    const currentY = Math.max(0, Math.min(pos.y, CANVAS_HEIGHT - 1));
    
    ctxTop.save();
    
    if (eraserMode) {
        ctxTop.globalCompositeOperation = 'destination-out';
        ctxTop.strokeStyle = 'rgba(0,0,0,1)';
        ctxTop.lineWidth = penWidth * 2;
        ctxTop.lineCap = 'round';
        ctxTop.lineJoin = 'round';
        ctxTop.beginPath();
        ctxTop.moveTo(lastX, lastY);
        ctxTop.lineTo(currentX, currentY);
        ctxTop.stroke();
    } else {
        ctxTop.globalCompositeOperation = 'source-over';
        ctxTop.strokeStyle = penColor;
        ctxTop.lineWidth = penWidth;
        ctxTop.lineCap = 'round';
        ctxTop.lineJoin = 'round';
        ctxTop.beginPath();
        ctxTop.moveTo(lastX, lastY);
        ctxTop.lineTo(currentX, currentY);
        ctxTop.stroke();
    }
    
    ctxTop.restore();
    
    lastX = currentX;
    lastY = currentY;
}

function stopDrawing(e) {
    e.preventDefault();
    if (isDrawing) {
        isDrawing = false;
        lastX = null;
        lastY = null;
        saveState();
    }
}

// ============================================================
// Undo / Redo
// ============================================================

function saveState() {
    const imageData = ctxTop.getImageData(0, 0, CANVAS_WIDTH, CANVAS_HEIGHT);
    if (undoStack.length > MAX_HISTORY) undoStack.shift();
    undoStack.push(imageData);
    redoStack = [];
}

function undo() {
    if (undoStack.length <= 1) {
        document.getElementById('status').textContent = '⚠️ 沒有更多步驟';
        return;
    }
    const current = ctxTop.getImageData(0, 0, CANVAS_WIDTH, CANVAS_HEIGHT);
    redoStack.push(current);
    undoStack.pop();
    ctxTop.putImageData(undoStack[undoStack.length - 1], 0, 0);
    document.getElementById('status').textContent = '↩️ 已復原';
}

function redo() {
    if (redoStack.length === 0) {
        document.getElementById('status').textContent = '⚠️ 沒有更多步驟';
        return;
    }
    const current = ctxTop.getImageData(0, 0, CANVAS_WIDTH, CANVAS_HEIGHT);
    undoStack.push(current);
    ctxTop.putImageData(redoStack.pop(), 0, 0);
    document.getElementById('status').textContent = '↪️ 已重做';
}

// ============================================================
// 清空畫布
// ============================================================

function clearCanvas() {
    if (confirm('確定要清除所有繪圖嗎？')) {
        ctxTop.clearRect(0, 0, CANVAS_WIDTH, CANVAS_HEIGHT);
        saveState();
        document.getElementById('status').textContent = '🗑 已清空';
    }
}

// ============================================================
// 匯出圖片
// ============================================================

function saveImage() {
    const tempCanvas = document.createElement('canvas');
    tempCanvas.width = CANVAS_WIDTH;
    tempCanvas.height = CANVAS_HEIGHT;
    const tempCtx = tempCanvas.getContext('2d');
    
    tempCtx.drawImage(canvasBottom, 0, 0);
    tempCtx.drawImage(canvasTop, 0, 0);
    
    const link = document.createElement('a');
    const now = new Date();
    const dateStr = now.getFullYear() + '-' + 
                   String(now.getMonth() + 1).padStart(2, '0') + '-' + 
                   String(now.getDate()).padStart(2, '0');
    link.download = '畢業帽塗鴉_' + dateStr + '.png';
    link.href = tempCanvas.toDataURL('image/png');
    link.click();
    document.getElementById('status').textContent = '💾 已儲存！';
}

// ============================================================
// 事件綁定
// ============================================================

canvasTop.addEventListener('mousedown', startDrawing);
canvasTop.addEventListener('mousemove', draw);
canvasTop.addEventListener('mouseup', stopDrawing);
canvasTop.addEventListener('mouseleave', stopDrawing);

canvasTop.addEventListener('touchstart', startDrawing, { passive: false });
canvasTop.addEventListener('touchmove', draw, { passive: false });
canvasTop.addEventListener('touchend', stopDrawing, { passive: false });

// 顏色
document.querySelectorAll('.color-btn').forEach(btn => {
    btn.addEventListener('click', function() {
        document.querySelectorAll('.color-btn').forEach(b => b.classList.remove('active'));
        this.classList.add('active');
        penColor = this.dataset.color;
        eraserMode = false;
        document.getElementById('btnPen').classList.add('active');
        document.getElementById('btnEraser').classList.remove('active');
        document.getElementById('colorPreview').style.background = penColor;
        document.getElementById('status').textContent = '🟢 畫筆模式';
    });
});

document.getElementById('customColor').addEventListener('input', function() {
    penColor = this.value;
    document.querySelectorAll('.color-btn').forEach(b => b.classList.remove('active'));
    document.getElementById('colorPreview').style.background = penColor;
    eraserMode = false;
    document.getElementById('btnPen').classList.add('active');
    document.getElementById('btnEraser').classList.remove('active');
    document.getElementById('status').textContent = '🟢 畫筆模式';
});

document.getElementById('customColorBtn').addEventListener('click', function() {
    document.getElementById('customColor').click();
});

document.getElementById('brushSize').addEventListener('input', function() {
    penWidth = parseInt(this.value);
    document.getElementById('sizeLabel').textContent = penWidth;
});

document.getElementById('btnPen').addEventListener('click', function() {
    eraserMode = false;
    this.classList.add('active');
    document.getElementById('btnEraser').classList.remove('active');
    document.getElementById('status').textContent = '🟢 畫筆模式';
});

document.getElementById('btnEraser').addEventListener('click', function() {
    eraserMode = true;
    this.classList.add('active');
    document.getElementById('btnPen').classList.remove('active');
    document.getElementById('status').textContent = '🧹 橡皮擦模式';
});

document.getElementById('btnUndo').addEventListener('click', undo);
document.getElementById('btnRedo').addEventListener('click', redo);
document.getElementById('btnClear').addEventListener('click', clearCanvas);
document.getElementById('btnSave').addEventListener('click', saveImage);

// ============================================================
// 啟動
